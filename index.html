<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pokémon Champions: Random Team Generator</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="194b70ad-8795-4b0b-8b71-f901a92d669f"></script>
</head>
<body>
    <div class="language-selector">
    <button onclick="cambiarIdioma('es')">ES</button>
    <button onclick="cambiarIdioma('en')">EN</button>
    </div>

    <div class="container">
        <div class="control-box">
        <h1 id="titulo">Generador de equipos random para Pokémon Champions</h1>
        
        <div class="controls-wrapper">
            <div class="checkbox-container">
        <label id="label-mega">
            <input type="checkbox" id="mega-toggle"><span id="text-mega">Incluir una Megaevolución</span>
        </label>
        <br>
        <label id="label-mega2">
            <input type="checkbox" id="second-mega-toggle" disabled> <span id="text-mega2">Incluir una segunda Megaevolución</span>
        </label>
            </div>

        <div class="selector-container">
            <label id="label-reglamento" for="reg-selector">Reglamento:</label>
            <br>
        <select id="reg-selector">
            <option value="todos" id="opt-todos">Todos</option>
            <option value="reg_1" id="opt-reg-1">Reglamento M-A</option>
            <option value="reg_2" id="opt-reg-2">Reglamento M-B</option>
        </select>
        </div>
        </div>
    <div id="regulation-image-container">
        <img id="reg-image" src="img/Estandar.jpg" alt="Regulación actual" style="width: 200px;">
    </div>
        <div id="pokemon-grid" class="grid-container"></div>
        
        <button id="random-btn">¡Generar equipo!</button>
    </div>
    </div>
    <script src="script.js"></script>
    <script type='text/javascript' src='https://storage.ko-fi.com/cdn/widget/Widget_2.js'></script>
    <script type='text/javascript'>kofiwidget2.init('Apóyame en Ko-fi', '#72a4f2', 'Z8Z6XJVG');kofiwidget2.draw();</script> 
</body>
</html>
