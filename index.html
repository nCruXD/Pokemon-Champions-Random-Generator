<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pokémon Champions: Random Team Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="control-box">
        <h1>Generador de equipos random para Pokémon Champions</h1>
        
        <div class="controls-wrapper">
            <div class="checkbox-container">
        <label>
            <input type="checkbox" id="mega-toggle"> Incluir una Megaevolución
        </label>
        <br>
        <label>
            <input type="checkbox" id="second-mega-toggle" disabled> Incluir una segunda Megaevolución
        </label>
            </div>

        <div class="selector-container">
            <label for="reg-selector">Reglamento:</label>
            <br>
        <select id="reg-selector">
            <option value="todos">Todos</option>
            <option value="reg_1">Reglamento M-A</option>
            <option value="reg_2">Regulación Especial Prueba</option>
        </select>
        </div>
        </div>
    <div id="regulation-image-container">
        <img id="reg-image" src="img/Estandar.jpg" alt="Regulación actual" style="width: 200px;">
    </div>
        <div id="pokemon-grid" class="grid-container"></div>
        
        <button id="random-btn">¡Elegir Pokémon!</button>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
